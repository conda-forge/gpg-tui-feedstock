context:
  version: "0.11.2"

package:
  name: gpg-tui
  version: ${{ version }}

source:
  url: https://github.com/orhun/gpg-tui/archive/v${{ version }}.tar.gz
  sha256: 2cbd0186b76b7bb5b4a21c76b2f4b344c03194731729aac645465f33d665ef91

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - pkg-config
  host:
    - gpgme
    - libgpg-error
  run:
    - gnupg

tests:
  - script:
      - gpg-tui --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Manage your GnuPG keys with ease!
  homepage: https://github.com/orhun/gpg-tui
  repository: https://github.com/orhun/gpg-tui

extra:
  recipe-maintainers:
    - danielnachun
